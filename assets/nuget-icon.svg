<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="glassgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Blurred blobs -->
  <circle cx="38" cy="80" r="30" fill="#7c3aed" opacity="0.3" filter="url(#blur)"/>
  <circle cx="90" cy="48" r="24" fill="#2563eb" opacity="0.25" filter="url(#blur)"/>
  <circle cx="70" cy="100" r="20" fill="#db2777" opacity="0.2" filter="url(#blur)"/>

  <!-- Glass window frame -->
  <rect x="22" y="30" width="84" height="66" rx="7" fill="url(#glassgrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="22" y="30" width="84" height="16" rx="7" fill="url(#titlebar)"/>
  <rect x="22" y="39" width="84" height="7" fill="url(#titlebar)"/>
  <!-- Traffic dots -->
  <circle cx="32" cy="38" r="3" fill="#f87171" opacity="0.9"/>
  <circle cx="42" cy="38" r="3" fill="#fbbf24" opacity="0.9"/>
  <circle cx="52" cy="38" r="3" fill="#34d399" opacity="0.9"/>
  <!-- Shimmer -->
  <rect x="22" y="30" width="42" height="66" rx="7" fill="url(#shimmer)" opacity="0.35"/>
  <!-- Content lines -->
  <rect x="30" y="56" width="52" height="4" rx="2" fill="white" opacity="0.18"/>
  <rect x="30" y="64" width="42" height="4" rx="2" fill="white" opacity="0.13"/>
  <rect x="30" y="72" width="48" height="4" rx="2" fill="white" opacity="0.15"/>
  <rect x="30" y="80" width="32" height="4" rx="2" fill="white" opacity="0.10"/>
  <!-- Border glow -->
  <rect x="22" y="30" width="84" height="66" rx="7" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
</svg>
