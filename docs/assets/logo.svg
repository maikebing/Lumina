<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="glassgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: 56x56 glass window -->
  <rect width="56" height="56" rx="11" fill="url(#bg)"/>
  <circle cx="17" cy="35" r="13" fill="#7c3aed" opacity="0.3" filter="url(#blur)"/>
  <circle cx="40" cy="22" r="11" fill="#2563eb" opacity="0.25" filter="url(#blur)"/>
  <!-- Glass frame -->
  <rect x="9" y="13" width="38" height="30" rx="3" fill="url(#glassgrad)" stroke="rgba(255,255,255,0.3)" stroke-width="0.75"/>
  <!-- Title bar -->
  <rect x="9" y="13" width="38" height="7" rx="3" fill="url(#titlebar)"/>
  <rect x="9" y="17" width="38" height="3" fill="url(#titlebar)"/>
  <!-- Traffic dots -->
  <circle cx="14" cy="16.5" r="1.5" fill="#f87171" opacity="0.9"/>
  <circle cx="19" cy="16.5" r="1.5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="24" cy="16.5" r="1.5" fill="#34d399" opacity="0.9"/>
  <!-- Shimmer -->
  <rect x="9" y="13" width="19" height="30" rx="3" fill="url(#shimmer)" opacity="0.35"/>
  <!-- Content lines -->
  <rect x="13" y="25" width="22" height="2" rx="1" fill="white" opacity="0.15"/>
  <rect x="13" y="29" width="18" height="2" rx="1" fill="white" opacity="0.10"/>
  <rect x="13" y="33" width="20" height="2" rx="1" fill="white" opacity="0.12"/>
  <!-- Border glow -->
  <rect x="9" y="13" width="38" height="30" rx="3" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.5" filter="url(#glow)"/>

  <!-- Wordmark: "Lumina" -->
  <text x="66" y="37"
        font-family="Segoe UI, system-ui, -apple-system, sans-serif"
        font-size="26"
        font-weight="600"
        letter-spacing="-0.5"
        fill="url(#wordmark)">Lumina</text>
</svg>
