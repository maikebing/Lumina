<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="glassgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Blurred background blobs for depth -->
  <circle cx="80" cy="160" r="60" fill="#7c3aed" opacity="0.3" filter="url(#blur)"/>
  <circle cx="180" cy="100" r="50" fill="#2563eb" opacity="0.25" filter="url(#blur)"/>
  <circle cx="140" cy="200" r="40" fill="#db2777" opacity="0.2" filter="url(#blur)"/>

  <!-- Glass window frame -->
  <rect x="48" y="64" width="160" height="128" rx="12" fill="url(#glassgrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="48" y="64" width="160" height="28" rx="12" fill="url(#titlebar)"/>
  <rect x="48" y="80" width="160" height="12" fill="url(#titlebar)"/>
  <!-- Title bar dots -->
  <circle cx="68" cy="78" r="4" fill="#f87171" opacity="0.9"/>
  <circle cx="82" cy="78" r="4" fill="#fbbf24" opacity="0.9"/>
  <circle cx="96" cy="78" r="4" fill="#34d399" opacity="0.9"/>
  <!-- Glass shimmer highlight -->
  <rect x="48" y="64" width="80" height="128" rx="12" fill="url(#shimmer)" opacity="0.4"/>
  <!-- Inner content lines (blurred) -->
  <rect x="64" y="108" width="100" height="6" rx="3" fill="white" opacity="0.15"/>
  <rect x="64" y="122" width="80" height="6" rx="3" fill="white" opacity="0.10"/>
  <rect x="64" y="136" width="90" height="6" rx="3" fill="white" opacity="0.12"/>
  <rect x="64" y="150" width="60" height="6" rx="3" fill="white" opacity="0.08"/>
  <!-- Border glow -->
  <rect x="48" y="64" width="160" height="128" rx="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
</svg>
