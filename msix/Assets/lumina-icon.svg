<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background radial gradient: deep navy center to dark purple edge -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <!-- Prism face gradients -->
    <linearGradient id="face-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="face-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="face-bottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <!-- Dispersion rays -->
    <linearGradient id="ray-red"   x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f87171" stop-opacity="0.9"/><stop offset="100%" stop-color="#f87171" stop-opacity="0"/></linearGradient>
    <linearGradient id="ray-orange" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fb923c" stop-opacity="0.9"/><stop offset="100%" stop-color="#fb923c" stop-opacity="0"/></linearGradient>
    <linearGradient id="ray-yellow" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#facc15" stop-opacity="0.9"/><stop offset="100%" stop-color="#facc15" stop-opacity="0"/></linearGradient>
    <linearGradient id="ray-green"  x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4ade80" stop-opacity="0.9"/><stop offset="100%" stop-color="#4ade80" stop-opacity="0"/></linearGradient>
    <linearGradient id="ray-cyan"   x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/><stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/></linearGradient>
    <linearGradient id="ray-blue"   x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/><stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/></linearGradient>
    <linearGradient id="ray-violet" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/></linearGradient>
    <!-- Incident white ray -->
    <linearGradient id="ray-white" x1="100%" y1="0%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Incident white ray (top-left → prism apex) -->
  <polygon points="12,22 36,34 36,38 12,30" fill="url(#ray-white)" opacity="0.85"/>

  <!-- Prism: equilateral triangle, centered -->
  <!-- apex (50,18), bottom-left (28,62), bottom-right (72,62) -->
  <polygon points="50,18 28,62 72,62" fill="url(#face-left)"  filter="url(#glow)"/>
  <!-- right face subtle overlay for 3-D separation -->
  <polygon points="50,18 72,62 72,62" fill="url(#face-right)" opacity="0.4"/>
  <!-- bottom edge shadow -->
  <polygon points="28,62 72,62 68,66 32,66" fill="url(#face-bottom)" opacity="0.7"/>
  <!-- Prism outline -->
  <polygon points="50,18 28,62 72,62" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- Dispersion rays (bottom-right of prism, fanning out) -->
  <!-- Each ray: thin parallelogram from prism base-right outward -->
  <polygon points="62,62 90,52 90,54 62,64" fill="url(#ray-violet)" filter="url(#glow)"/>
  <polygon points="62,63 90,55 90,57 62,65" fill="url(#ray-blue)"   filter="url(#glow)"/>
  <polygon points="62,64 90,58 90,60 62,66" fill="url(#ray-cyan)"   filter="url(#glow)"/>
  <polygon points="62,65 90,61 90,63 62,67" fill="url(#ray-green)"  filter="url(#glow)"/>
  <polygon points="62,66 90,64 90,66 62,68" fill="url(#ray-yellow)" filter="url(#glow)"/>
  <polygon points="62,67 90,67 90,69 62,69" fill="url(#ray-orange)" filter="url(#glow)"/>
  <polygon points="62,68 90,70 90,72 62,70" fill="url(#ray-red)"    filter="url(#glow)"/>
</svg>
