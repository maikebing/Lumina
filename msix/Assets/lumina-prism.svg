<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#1e1040"/>
    </linearGradient>
    <linearGradient id="prismface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="prismside" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Rainbow spectrum -->
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f87171"/>
      <stop offset="17%"  stop-color="#fb923c"/>
      <stop offset="33%"  stop-color="#fbbf24"/>
      <stop offset="50%"  stop-color="#34d399"/>
      <stop offset="67%"  stop-color="#60a5fa"/>
      <stop offset="83%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="specglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bggrad)"/>

  <!-- Prism triangle body -->
  <polygon points="128,48 210,190 46,190" fill="url(#prismface)" stroke="#c4b5fd" stroke-width="1.5" opacity="0.9"/>
  <!-- Prism side shading -->
  <polygon points="128,48 210,190 46,190" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- Light ray in (white beam entering left face) -->
  <line x1="30" y1="110" x2="110" y2="145" stroke="white" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>

  <!-- Rainbow spectrum out -->
  <g filter="url(#specglow)">
    <line x1="155" y1="158" x2="230" y2="120" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="155" y1="158" x2="232" y2="132" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="155" y1="158" x2="232" y2="144" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="155" y1="158" x2="230" y2="156" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="155" y1="158" x2="226" y2="168" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="155" y1="158" x2="220" y2="179" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="155" y1="158" x2="212" y2="190" stroke="#e879f9" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Refraction point highlight -->
  <circle cx="155" cy="158" r="4" fill="white" opacity="0.6" filter="url(#glow)"/>
</svg>
