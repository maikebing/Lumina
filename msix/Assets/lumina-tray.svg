<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#e0d7ff"/>
      <stop offset="40%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 8 rays -->
  <g stroke="#a78bfa" stroke-linecap="round" filter="url(#glow)" opacity="0.85">
    <line x1="16" y1="3"  x2="16" y2="8"  stroke-width="1.8"/>
    <line x1="16" y1="24" x2="16" y2="29" stroke-width="1.8"/>
    <line x1="3"  y1="16" x2="8"  y2="16" stroke-width="1.8"/>
    <line x1="24" y1="16" x2="29" y2="16" stroke-width="1.8"/>
    <line x1="6.5"  y1="6.5"  x2="10.0" y2="10.0" stroke-width="1.4"/>
    <line x1="22.0" y1="22.0" x2="25.5" y2="25.5" stroke-width="1.4"/>
    <line x1="25.5" y1="6.5"  x2="22.0" y2="10.0" stroke-width="1.4"/>
    <line x1="10.0" y1="22.0" x2="6.5"  y2="25.5" stroke-width="1.4"/>
  </g>

  <!-- Center orb -->
  <circle cx="16" cy="16" r="5.5" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
</svg>
