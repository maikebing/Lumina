<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Glass window outline: border + title bar + three dots -->
  <!-- Window frame -->
  <rect x="2" y="4" width="28" height="24" rx="3.5"
        fill="none" stroke="white" stroke-width="1.75"/>
  <!-- Title bar divider -->
  <line x1="2" y1="11" x2="30" y2="11" stroke="white" stroke-width="1.25" opacity="0.9"/>
  <!-- Three traffic dots -->
  <circle cx="7"  cy="7.5" r="1.5" fill="white" opacity="0.95"/>
  <circle cx="12" cy="7.5" r="1.5" fill="white" opacity="0.95"/>
  <circle cx="17" cy="7.5" r="1.5" fill="white" opacity="0.95"/>
  <!-- Content lines (subtle) -->
  <rect x="6" y="15" width="14" height="1.5" rx="0.75" fill="white" opacity="0.45"/>
  <rect x="6" y="19" width="10" height="1.5" rx="0.75" fill="white" opacity="0.35"/>
  <rect x="6" y="23" width="12" height="1.5" rx="0.75" fill="white" opacity="0.30"/>
</svg>
