<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 150">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="glassgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="310" height="150" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <circle cx="40" cy="100" r="55" fill="#7c3aed" opacity="0.25" filter="url(#blur)"/>
  <circle cx="120" cy="50" r="45" fill="#2563eb" opacity="0.2" filter="url(#blur)"/>

  <!-- Glass window icon (left side) -->
  <rect x="24" y="18" width="102" height="114" rx="10" fill="url(#glassgrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="24" y="18" width="102" height="26" rx="10" fill="url(#titlebar)"/>
  <rect x="24" y="31" width="102" height="13" fill="url(#titlebar)"/>
  <!-- Traffic dots -->
  <circle cx="38" cy="31" r="5" fill="#f87171" opacity="0.9"/>
  <circle cx="52" cy="31" r="5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="66" cy="31" r="5" fill="#34d399" opacity="0.9"/>
  <!-- Shimmer -->
  <rect x="24" y="18" width="51" height="114" rx="10" fill="url(#shimmer)" opacity="0.35"/>
  <!-- Content lines -->
  <rect x="34" y="56" width="72" height="5" rx="2.5" fill="white" opacity="0.15"/>
  <rect x="34" y="67" width="58" height="5" rx="2.5" fill="white" opacity="0.10"/>
  <rect x="34" y="78" width="65" height="5" rx="2.5" fill="white" opacity="0.12"/>
  <rect x="34" y="89" width="44" height="5" rx="2.5" fill="white" opacity="0.08"/>
  <!-- Border glow -->
  <rect x="24" y="18" width="102" height="114" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5" filter="url(#glow)"/>

  <!-- Wordmark (right side) -->
  <text x="148" y="82"
        font-family="Segoe UI, system-ui, -apple-system, sans-serif"
        font-size="46"
        font-weight="600"
        letter-spacing="-1"
        fill="url(#wordmark)">Lumina</text>
  <!-- Subtitle -->
  <text x="150" y="106"
        font-family="Segoe UI, system-ui, -apple-system, sans-serif"
        font-size="14"
        font-weight="400"
        letter-spacing="0.5"
        fill="#818cf8"
        opacity="0.8">Windows Visual Effects</text>
</svg>
