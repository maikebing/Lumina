<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="44" height="44" rx="10" fill="url(#bg)"/>

  <!-- Glass window frame -->
  <rect x="6" y="9" width="32" height="26" rx="4" fill="url(#glass)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="6" y="9" width="32" height="9" rx="4" fill="url(#titlebar)"/>
  <rect x="6" y="14" width="32" height="4" fill="url(#titlebar)"/>

  <!-- Traffic dots -->
  <circle cx="11" cy="13" r="2" fill="#f87171" opacity="0.95"/>
  <circle cx="17" cy="13" r="2" fill="#fbbf24" opacity="0.95"/>
  <circle cx="23" cy="13" r="2" fill="#34d399" opacity="0.95"/>

  <!-- Shimmer highlight -->
  <rect x="6" y="9" width="16" height="26" rx="4" fill="url(#shimmer)"/>

  <!-- Content lines -->
  <rect x="10" y="23" width="18" height="2.5" rx="1.25" fill="white" opacity="0.2"/>
  <rect x="10" y="27" width="14" height="2.5" rx="1.25" fill="white" opacity="0.14"/>

  <!-- Border glow -->
  <rect x="6" y="9" width="32" height="26" rx="4" fill="none" stroke="#a78bfa" stroke-width="0.75" opacity="0.6" filter="url(#glow)"/>
</svg>
