<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#f0abfc"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rayglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ray1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="ray3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="ray4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>

  <!-- Cardinal rays with color gradients -->
  <g filter="url(#rayglow)">
    <line x1="16" y1="2.5" x2="16" y2="8" stroke="url(#ray1)" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="24" x2="16" y2="29.5" stroke="url(#ray1)" stroke-width="2" stroke-linecap="round"/>
    <line x1="2.5" y1="16" x2="8" y2="16" stroke="url(#ray2)" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="16" x2="29.5" y2="16" stroke="url(#ray2)" stroke-width="2" stroke-linecap="round"/>
    <!-- Diagonal rays -->
    <line x1="5.5" y1="5.5" x2="9.5" y2="9.5" stroke="url(#ray3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22.5" y1="22.5" x2="26.5" y2="26.5" stroke="url(#ray3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="26.5" y1="5.5" x2="22.5" y2="9.5" stroke="url(#ray4)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9.5" y1="22.5" x2="5.5" y2="26.5" stroke="url(#ray4)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Center orb -->
  <circle cx="16" cy="16" r="6" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="14.5" cy="14" r="2" fill="white" opacity="0.25"/>
</svg>
